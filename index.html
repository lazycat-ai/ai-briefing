<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 行业日报</title>
<style>
  :root {
    --orange: #FF6611;
    --orange-light: #FF8844;
    --orange-bg: #FFF5EE;
    --bg: #FAFAFA;
    --white: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #555555;
    --text-light: #888888;
    --border: #F0E8E2;
    --shadow: 0 2px 12px rgba(255,102,17,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.8;
  }
  .header {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
    color: #fff; padding: 48px 24px 36px; text-align: center;
    position: relative; overflow: hidden;
  }
  .header::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 24px; background: var(--bg); border-radius: 24px 24px 0 0;
  }
  .header-label {
    display: inline-block; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 16px; margin-bottom: 14px;
  }
  .header h1 { font-size: 28px; font-weight: 700; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 6px; }
  .container { max-width: 600px; margin: 0 auto; padding: 32px 20px 60px; }
  .section-title { font-size: 16px; font-weight: 600; color: var(--text-light); margin-bottom: 16px; }
  .briefing-card {
    display: block; text-decoration: none; color: var(--text);
    background: var(--white); border: 1px solid var(--border); border-radius: 14px;
    padding: 20px; margin-bottom: 12px; box-shadow: var(--shadow);
    transition: all 0.2s ease;
  }
  .briefing-card:hover {
    box-shadow: 0 4px 20px rgba(255,102,17,0.1); border-color: #FFD4B8;
    transform: translateY(-2px);
  }
  .briefing-date { font-size: 20px; font-weight: 700; color: var(--orange); }
  .briefing-weekday { font-size: 13px; color: var(--text-light); margin-left: 8px; }
  .briefing-summary { font-size: 14px; color: var(--text-secondary); margin-top: 6px; }
  .briefing-stats {
    display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--text-light);
  }
  .briefing-stats span { background: var(--orange-bg); padding: 2px 8px; border-radius: 4px; }
  .footer {
    text-align: center; padding: 32px 24px; font-size: 12px;
    color: var(--text-light); border-top: 1px solid var(--border); margin-top: 20px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Daily Intelligence Archive</div>
  <h1>AI 行业日报</h1>
  <p>为滴滴拉美业务定制 · 每日更新</p>
</div>

<div class="container">
  <div class="section-title">历史日报</div>

  <a class="briefing-card" href="briefings/2026-04-17.html">
    <span class="briefing-date">2026.04.17</span>
    <span class="briefing-weekday">星期五</span>
    <div class="briefing-summary">GPT-6 发布 · Claude Opus 4.7 · iFood 120个AI模型 · Grab 13项AI功能 · 千问接入阿里全生态</div>
    <div class="briefing-stats">
      <span>14 条新闻</span>
      <span>6 个模型更新</span>
      <span>7 家竞对</span>
    </div>
  </a>

  <!-- 每天新增一个 briefing-card 即可 -->

</div>

<div class="footer">AI 行业情报助手 · 数据来源为公开信息</div>

</body>
</html>
